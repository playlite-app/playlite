name: Publish Playlite
on:
  push:
    tags:
      - 'v*'
jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      # CHANGELOG
      - name: Extract latest version and changelog notes
        id: changelog
        shell: pwsh
        run: |
          # Read changelog and find the first '## [version]' heading (latest entry)
          $content = Get-Content CHANGELOG.md -ErrorAction Stop

          $firstHeader = $content | Select-String -Pattern '^## \[([^\]]+)\]' -AllMatches | Select-Object -First 1

          if ($firstHeader) {
            $version = $firstHeader.Matches[0].Groups[1].Value
            $start = $firstHeader.LineNumber

            # Find the next '## [' header after the start to determine the end of this section
            $next = ($content | Select-String -Pattern '^## \[' | Where-Object { $_.LineNumber -gt $start } | Select-Object -First 1)
            if ($next) { $end = $next.LineNumber } else { $end = $content.Length + 1 }

            $notes = $content[($start-1)..($end-2)] -join "`n"
          }
          else {
            Write-Host "No changelog header found; falling back to tag name"
            $version = "${{ github.ref_name }}".Replace("v", "")
            $notes = "No changelog entry found for version $version"
          }

          # Save to file (optional) and export as environment variables for subsequent steps
          $notes | Out-File release_notes.md -Encoding utf8

          # Export VERSION and multi-line RELEASE_NOTES to GITHUB_ENV so they are available to later steps
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_NOTES<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Get-Content release_notes.md | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}

        with:
          # Use the version extracted from CHANGELOG.md (exported to env.VERSION)
          tagName: v${{ env.VERSION }}
          releaseName: "Playlite v${{ env.VERSION }}"
          releaseBody: |
            ${{ env.RELEASE_NOTES }}

            ---

            Download the installer below.
          releaseDraft: false
          prerelease: false
